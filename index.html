<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Architect Unbound | 125% Scale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #2563eb; --bg: #000000; }
        
        html, body { 
            background: var(--bg); 
            height: 100vh; 
            width: 100vw; 
            margin: 0; 
            overflow: hidden; 
            position: fixed;
        }

        /* The Scaled Viewport: Set base size to 80% so that 1.25x scale fits exactly 100% of screen */
        .viewport-scaled {
            width: 80%; 
            height: 80%;
            transform: scale(1.25);
            transform-origin: top left;
            display: grid;
            grid-template-columns: 200px 1fr;
            background: var(--bg);
        }

        .sidebar { background: #050505; border-right: 1px solid #111; display: flex; flex-direction: column; }
        .scroll-area::-webkit-scrollbar { width: 3px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #333; }

        .project-card { cursor: pointer; padding: 12px; border-bottom: 1px solid #111; transition: 0.1s; font-size: 12px; }
        .project-card.active { background: #0f172a; border-left: 4px solid var(--accent); }

        .code-container { background: #080808; border: 1px solid #1e293b; border-radius: 4px; margin: 12px 0; }
        .code-header { background: #0f172a; padding: 6px 14px; display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; }
        .code-content { 
            padding: 14px; 
            font-family: 'Menlo', 'Fira Code', monospace; 
            font-size: 11px; 
            line-height: 1.3; 
            color: #60a5fa; 
            overflow: auto; 
            white-space: pre; 
        }

        .chat-bubble { max-width: 88%; font-size: 13px; padding: 10px 14px; border-radius: 10px; line-height: 1.4; }
        .ai-bubble { background: #0f172a; border: 1px solid #1e293b; color: #cbd5e1; }
        .user-bubble { background: var(--accent); align-self: flex-end; color: white; }
        
        .copy-btn { font-size: 10px; font-weight: 900; padding: 4px 10px; background: #059669; color: white; border-radius: 4px; }
        .input-bar { padding: 16px; border-top: 1px solid #111; background: #000; }
        
        input { font-size: 13px !important; }
    </style>
</head>
<body>

    <div class="viewport-scaled">
        <aside class="sidebar">
            <div class="p-4 border-b border-slate-900">
                <button onclick="createNewProject()" class="w-full py-3 bg-blue-700 text-[10px] font-black rounded-lg uppercase tracking-widest shadow-lg">+ NEW SESSION</button>
            </div>
            <div id="project-list" class="flex-1 overflow-y-auto scroll-area"></div>
        </aside>

        <main class="flex flex-col overflow-hidden">
            <header class="h-12 flex items-center justify-between px-8 border-b border-slate-900">
                <span id="active-title" class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Architect Core v5</span>
                <button onclick="deleteCurrentProject()" class="text-[10px] text-red-900 font-bold hover:text-red-500">TERMINATE</button>
            </header>

            <div id="master-stream" class="flex-1 overflow-y-auto scroll-area p-8 flex flex-col gap-6"></div>

            <div class="input-bar">
                <div class="max-w-5xl mx-auto flex gap-4">
                    <input id="user-prompt" 
                        class="flex-1 h-12 px-5 bg-slate-900 border border-slate-800 rounded-xl outline-none text-white"
                        placeholder="Request unrestricted HTML script..." onkeydown="if(event.key==='Enter') handleSend()">
                    <button id="send-btn" onclick="handleSend()" 
                        class="px-8 bg-blue-600 rounded-xl font-black text-[11px] uppercase tracking-widest transition active:scale-95 shadow-md">
                        GENERATE
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let projects = JSON.parse(localStorage.getItem('zoomed_125_v1')) || [];
        let activeId = null;
        let isTyping = false;

        function save() { localStorage.setItem('zoomed_125_v1', JSON.stringify(projects)); renderProjectList(); }

        function createNewProject() {
            const name = prompt("Session Name:");
            if (!name) return;
            const newProj = { id: Date.now(), title: name, history: [] };
            projects.push(newProj);
            save(); loadProject(newProj.id);
        }

        function loadProject(id) {
            activeId = id;
            const p = projects.find(x => x.id === id);
            document.getElementById('active-title').innerText = p.title;
            renderStream();
            renderProjectList();
        }

        function deleteCurrentProject() {
            if (!activeId || !confirm("Delete?")) return;
            projects = projects.filter(x => x.id !== activeId);
            activeId = projects.length > 0 ? projects[0].id : null;
            save();
            if (activeId) loadProject(activeId);
            else document.getElementById('master-stream').innerHTML = '';
        }

        function handleSend() {
            const input = document.getElementById('user-prompt');
            const val = input.value.trim();
            if (!val || !activeId || isTyping) return;
            const p = projects.find(x => x.id === activeId);
            p.history.push({ role: 'user', type: 'text', content: val });
            input.value = "";
            renderStream();
            isTyping = true;
            setTimeout(() => {
                p.history.push({ role: 'ai', type: 'text', content: `Processing unrestricted HTML module for: ${val}...` });
                renderStream();
                streamHtml(p, val);
            }, 300);
        }

        function streamHtml(project, val) {
            const blockId = 'b-' + Date.now();
            const hIdx = project.history.length;
            project.history.push({ role: 'ai', type: 'code', content: "", id: blockId });
            
            const code = `<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <title>Architect: ${val}</title>\n    <style>\n        body { background: #000; color: #fff; font-family: 'Menlo', monospace; padding: 40px; }\n        .box { border: 1px solid #333; padding: 30px; border-radius: 8px; }\n        h1 { color: #2563eb; }\n    </style>\n</head>\n<body>\n    <div class="box">\n        <h1>${val}</h1>\n        <p>Complex sequence initialized.</p>\n    </div>\n    <script>\n        class Logic {\n            constructor() { console.log("${val} module injected."); }\n        }\n        new Logic();\n    <\/script>\n</body>\n</html>`;

            let i = 0;
            function type() {
                if (i < code.length) {
                    project.history[hIdx].content += code.substring(i, i + 120);
                    i += 120;
                    renderStream();
                    document.getElementById('master-stream').scrollTop = 999999;
                    setTimeout(type, 5);
                } else { isTyping = false; save(); }
            }
            type();
        }

        function renderProjectList() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(p => `
                <div onclick="loadProject(${p.id})" class="project-card ${activeId === p.id ? 'active' : ''}">
                    <div class="truncate font-black text-slate-400 uppercase tracking-tighter">${p.title}</div>
                </div>
            `).join('');
        }

        function renderStream() {
            const p = projects.find(x => x.id === activeId);
            const container = document.getElementById('master-stream');
            if (!p) return;
            container.innerHTML = p.history.map(m => {
                if (m.type === 'text') {
                    return `<div class="flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'}">
                        <div class="chat-bubble ${m.role === 'user' ? 'user-bubble' : 'ai-bubble'}">${m.content}</div>
                    </div>`;
                } else {
                    return `<div class="code-container">
                        <div class="code-header"><span class="text-[10px] font-black text-slate-600 uppercase">UNRESTRICTED HTML MODULE</span>
                        <button onclick="copyCode('${m.id}')" id="btn-${m.id}" class="copy-btn">COPY</button></div>
                        <div class="code-content" id="${m.id}">${m.content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
                    </div>`;
                }
            }).join('');
            if(!isTyping) container.scrollTop = container.scrollHeight;
        }

        function copyCode(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            const b = document.getElementById('btn-' + id);
            b.innerText = "COPIED";
            setTimeout(() => b.innerText = "COPY", 1000);
        }

        if (projects.length > 0) loadProject(projects[0].id);
        else renderProjectList();
    </script>
</body>
</html>
